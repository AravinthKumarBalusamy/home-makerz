<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="HomeMakerz - Home Management System for your household">
  <meta name="theme-color" content="#2d3748">
  <title>HomeMakerz</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <div id="app-container">
    <!-- Left Sidebar -->
    <aside id="sidebar-left" class="sidebar sidebar-left">
      <div class="sidebar-header">
        <h1 class="logo">🏠 HomeMakerz</h1>
        <button class="sidebar-close" id="close-left-sidebar" title="Close sidebar">&times;</button>
      </div>
      <nav class="nav-menu" id="nav-menu">
        <a href="#/dashboard" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">📋</span><span class="nav-label">Dashboard</span>
        </a>
        <a href="#/tasks" class="nav-item" data-page="tasks">
          <span class="nav-icon">✅</span><span class="nav-label">Tasks</span>
        </a>
        <a href="#/budget" class="nav-item" data-page="budget">
          <span class="nav-icon">💰</span><span class="nav-label">Budget</span>
        </a>
        <a href="#/expenses" class="nav-item" data-page="expenses">
          <span class="nav-icon">💳</span><span class="nav-label">Expenses</span>
        </a>
        <a href="#/bills" class="nav-item" data-page="bills">
          <span class="nav-icon">📄</span><span class="nav-label">Bill Scanner</span>
        </a>
        <a href="#/income" class="nav-item" data-page="income">
          <span class="nav-icon">💵</span><span class="nav-label">Income</span>
        </a>
        <a href="#/goals" class="nav-item" data-page="goals">
          <span class="nav-icon">🎯</span><span class="nav-label">Goals & Habits</span>
        </a>
        <a href="#/kids" class="nav-item" data-page="kids">
          <span class="nav-icon">👶</span><span class="nav-label">Kids</span>
        </a>
        <a href="#/notes" class="nav-item" data-page="notes">
          <span class="nav-icon">📝</span><span class="nav-label">Sticky Notes</span>
        </a>
        <a href="#/savings" class="nav-item" data-page="savings">
          <span class="nav-icon">🏦</span><span class="nav-label">Savings</span>
        </a>
        <a href="#/reports" class="nav-item" data-page="reports">
          <span class="nav-icon">📊</span><span class="nav-label">Reports</span>
        </a>
        <a href="#/settings" class="nav-item" data-page="settings">
          <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
        </a>
      </nav>
      <div class="sidebar-widgets" id="left-widgets"></div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <header class="top-bar">
        <button class="menu-btn" id="toggle-left-sidebar" title="Toggle sidebar">☰</button>
        <div class="top-bar-title" id="page-title">Dashboard</div>
        <div class="top-bar-right">
          <span class="today-date" id="today-date"></span>
          <button class="menu-btn" id="toggle-right-sidebar" title="Toggle widgets">◫</button>
        </div>
      </header>
      <div class="page-content" id="page-content">
        <div class="loading">Loading...</div>
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside id="sidebar-right" class="sidebar sidebar-right">
      <div class="sidebar-header">
        <h2 class="sidebar-title">Widgets</h2>
        <button class="sidebar-close" id="close-right-sidebar" title="Close sidebar">&times;</button>
      </div>
      <div class="sidebar-widgets" id="right-widgets"></div>
    </aside>
    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
  </div>

  <!-- Bottom Navigation (mobile PWA) -->
  <nav id="bottom-nav" class="bottom-nav">
    <a href="#/dashboard" class="bottom-nav-item active" data-page="dashboard">
      <span class="bottom-nav-icon">📋</span>
      <span class="bottom-nav-label">Home</span>
    </a>
    <a href="#/tasks" class="bottom-nav-item" data-page="tasks">
      <span class="bottom-nav-icon">✅</span>
      <span class="bottom-nav-label">Tasks</span>
    </a>
    <a href="#/expenses" class="bottom-nav-item" data-page="expenses">
      <span class="bottom-nav-icon">💳</span>
      <span class="bottom-nav-label">Expenses</span>
    </a>
    <a href="#/budget" class="bottom-nav-item" data-page="budget">
      <span class="bottom-nav-icon">💰</span>
      <span class="bottom-nav-label">Budget</span>
    </a>
    <button class="bottom-nav-item" id="bottom-nav-more">
      <span class="bottom-nav-icon">☰</span>
      <span class="bottom-nav-label">More</span>
    </button>
  </nav>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/tasks.js"></script>
  <script src="/js/budget.js"></script>
  <script src="/js/expenses.js"></script>
  <script src="/js/income.js"></script>
  <script src="/js/goals.js"></script>
  <script src="/js/kids.js"></script>
  <script src="/js/notes.js"></script>
  <script src="/js/savings.js"></script>
  <script src="/js/reports.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/bills.js"></script>
  <script src="/js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(r => console.log('SW registered'))
        .catch(e => console.log('SW failed:', e));
    }
  </script>
</body>

</html>
