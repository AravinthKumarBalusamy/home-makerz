services:
  - type: web
    name: homemakerz
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: APP_PIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
