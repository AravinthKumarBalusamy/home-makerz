app = "home-makerz"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false    # ← changed
  auto_start_machines = true
  min_machines_running = 1      # ← changed
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"